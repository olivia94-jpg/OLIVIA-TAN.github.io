let toastTimer = null;
function showSaveToast() {
  const el = document.getElementById('save-toast');
  if (!el) return;
  el.innerHTML = t('saveToast');
  el.classList.add('visible');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('visible'), 4200);
}

/* ══════════════════════════════════════════════════════ */

function initControls(api, camRig) {
  const transcript = [];
  let state = 'idle';
  let pendingUserText = '';

  const msgStream = document.getElementById('msg-stream');
  const splash = document.getElementById('splash-text');
  const textInput = document.getElementById('text-input');
  const btnSend = document.getElementById('btn-send');
  const btnVoice = document.getElementById('btn-voice');
  const btnEnd = document.getElementById('btn-end');
  const cardDock = document.getElementById('card-dock');
  const starDetail = document.getElementById('fruit-detail');
  const statusEl = document.getElementById('status-line');
  const searchInput = document.getElementById('search-stars');
  const recognition = createRecognition();

  function setStatus(s) { if (statusEl) statusEl.textContent = s; }

  function addImmMsg(role, text) {
    if (!msgStream) return;
    const el = document.createElement('div');
    el.className = `imm-msg ${role === 'user' ? 'user-msg' : 'ai-msg'}`;
    el.innerHTML = `<div class="msg-role">${role === 'user' ? t('me') : t('ai')}</div><div>${text}</div>`;
    msgStream.appendChild(el);
    const all = msgStream.querySelectorAll('.imm-msg');
    if (all.length > 8) {
      const oldest = all[0];
      oldest.style.opacity = '0';
      setTimeout(() => oldest.remove(), 450);
    }
    setTimeout(() => el.classList.add('fading'), 12000);
  }

  /** Dialogue FX: pulse + constellation line */
  function runDialogueFX() {
    setParticlePhase('burst');
    api.simUniforms.uCurlBoost.value = 3.0;
    gsap.to(api.simUniforms.uCurlBoost, { value: 1, duration: 1.6, ease: 'power2.out', delay: 0.1 });
    gsap.delayedCall(0.4, () => setParticlePhase('attract'));
    gsap.delayedCall(2.0, () => setParticlePhase('idle'));
    gsap.fromTo(camRig, { nudge: 0 }, { nudge: 0.25, duration: 0.5, yoyo: true, repeat: 1, ease: 'sine.inOut' });

    const buf = api.readParticlePositions();
    api.constellationSystem.addRandomLine(buf, api.texSize);
  }

  async function assistantReply() {
    const typing = document.createElement('div');
    typing.className = 'imm-msg ai-msg';
    typing.style.opacity = '0.5';
    typing.innerHTML = `<div class="msg-role">${t('ai')}</div><div>${t('thinking')}</div>`;
    msgStream?.appendChild(typing);

    const messages = [
      { role: 'system', content: getLang() === 'en' ? SYSTEM_PROMPT_EN : SYSTEM_PROMPT_ZH },
      ...transcript.map((m) => ({ role: m.role, content: m.text })),
    ];
    let text = await fetchDeepSeek(messages);
    if (!text) {
      const fb = getLang() === 'en' ? FALLBACK_REPLIES_EN : FALLBACK_REPLIES_ZH;
      text = fb[transcript.length % fb.length];
    }
    typing.remove();

    transcript.push({ role: 'assistant', text });
    addImmMsg('assistant', text);
    runDialogueFX();
    setStatus('');
  }

  function handleUserInput(text) {
    const v = (text || '').trim();
    if (!v || state === 'card' || state === 'ending') return;
    if (state === 'idle') {
      state = 'chatting';
      splash?.classList.add('hidden');
    }
    pendingUserText = v;
    transcript.push({ role: 'user', text: v });
    addImmMsg('user', v);
    api.simUniforms.uTypingPulse.value = 0.8;
    assistantReply();
  }

  async function requestSummary() {
    if (!transcript.length) return buildLocalCard(transcript);
    const local = buildLocalCard(transcript);
    const ctx = transcript.map((m) => `${m.role === 'user' ? (getLang() === 'en' ? 'User' : '用户') : 'AI'}: ${m.text}`).join('\n');
    const raw = await fetchDeepSeek([
      { role: 'system', content: getLang() === 'en' ? CARD_SYSTEM_PROMPT_EN : CARD_SYSTEM_PROMPT_ZH },
      { role: 'user', content: getLang() === 'en' ? `Full conversation below, generate card JSON:\n\n${ctx}` : `以下为完整对话，请据此生成 JSON 卡片：\n\n${ctx}` },
    ]);
    if (!raw) return local;
    try {
      const clean = raw.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
      const d = JSON.parse(clean);
      if (d?.title && Array.isArray(d?.bullets)) {
        return {
          title: d.title,
          bullets: d.bullets.filter(Boolean).slice(0, 10),
          actions: Array.isArray(d.actions) ? d.actions.filter(Boolean).slice(0, 8) : local.actions,
        };
      }
    } catch { /* ignore */ }
    return local;
  }

  function renderCard(card) {
    const ts = new Date().toLocaleString(getLang() === 'en' ? 'en-US' : 'zh-CN', { hour12: false });
    const wrap = document.createElement('div');
    wrap.className = 'inspiration-card';
    wrap.innerHTML = `
      <header><h2 class="card-title"></h2><time></time></header>
      <section><h4>${t('cardSummary')}</h4><ul class="card-bullets"></ul></section>
      <section><h4>${t('cardActions')}</h4><ol class="card-actions"></ol></section>
      <div class="card-actions-row">
        <button type="button" class="card-dismiss">${t('cardDismiss')}</button>
        <button type="button" class="card-save">${t('cardSave')}</button>
        <button type="button" class="card-newchat">${t('cardNewChat')}</button>
      </div>`;
    wrap.querySelector('.card-title').textContent = card.title || t('cardTitle');
    wrap.querySelector('time').textContent = ts;
    const ul = wrap.querySelector('.card-bullets');
    const ol = wrap.querySelector('.card-actions');
    card.bullets.forEach((b) => { const li = document.createElement('li'); li.textContent = b; ul.appendChild(li); });
    card.actions.forEach((a) => { const li = document.createElement('li'); li.textContent = a; ol.appendChild(li); });
    wrap.querySelector('.card-dismiss').addEventListener('click', () => {
      cardDock?.classList.remove('card-visible');
      cardDock.innerHTML = '';
      state = 'idle';
    });
    wrap.querySelector('.card-save').addEventListener('click', () => {
      const blob = new Blob([wrap.innerText], { type: 'text/plain;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${t('cardFilePrefix')}-${Date.now()}.txt`;
      a.click();
      URL.revokeObjectURL(a.href);
      showSaveToast();
    });
    wrap.querySelector('.card-newchat').addEventListener('click', resetChat);
    return wrap;
  }

  function showCard(cardData) {
    const card = renderCard(cardData);
    cardDock.innerHTML = '';
    cardDock.appendChild(card);
    cardDock.classList.add('card-visible');
    gsap.fromTo(card, { opacity: 0, y: 20, scale: 0.92 }, { opacity: 1, y: 0, scale: 1, duration: 0.55, ease: 'power2.out' });
  }

  /** End session: shoot a star, fade constellation lines, then show card */
  async function endSession() {
    if (!transcript.length || state === 'card' || state === 'ending') return;
    state = 'ending';

    const cardData = await requestSummary();
    cardData.generatedAt = new Date().toISOString();
    await api.inspirationStarSystem.spawnShootingStar(cardData);
    api.constellationSystem.fadeAll(2.0);
    showCard(cardData);
    state = 'card';
    setParticlePhase('idle');
  }

  /** New chat: clear dialogue and constellation lines, keep stars */
  function resetChat() {
    transcript.length = 0;
    state = 'idle';
    if (msgStream) msgStream.innerHTML = '';
    cardDock?.classList.remove('card-visible');
    if (cardDock) cardDock.innerHTML = '';
    starDetail?.classList.remove('visible');
    api.constellationSystem.clearAll();
    setParticlePhase('idle');
    splash?.classList.remove('hidden');
    setStatus('');
  }

  /** Click on an inspiration star → show its card */
  api.inspirationStarSystem.setOnStarClick((cardData) => {
    if (cardData) showCard(cardData);
  });

  /* ── Search: highlight matching stars AND auto-extract their card ── */
  if (searchInput) {
    let searchTimeout;
    let searchCardShown = false;
    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        const kw = searchInput.value.trim();
        if (kw) {
          api.inspirationStarSystem.searchHighlight(kw);
          const matched = api.inspirationStarSystem.getFirstMatch(kw);
          if (matched && !searchCardShown) {
            searchCardShown = true;
            showCard(matched);
          } else if (!matched) {
            if (searchCardShown) {
              cardDock?.classList.remove('card-visible');
              if (cardDock) cardDock.innerHTML = '';
              searchCardShown = false;
            }
          }
        } else {
          api.inspirationStarSystem.clearHighlight();
          if (searchCardShown) {
            cardDock?.classList.remove('card-visible');
            if (cardDock) cardDock.innerHTML = '';
            searchCardShown = false;
          }
        }
      }, 400);
    });
  }

  /* ── UI event bindings ── */
  textInput?.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      const v = textInput.value;
      textInput.value = '';
      handleUserInput(v);
    }
  });
  btnSend?.addEventListener('click', () => {
    const v = textInput?.value || '';
    if (textInput) textInput.value = '';
    handleUserInput(v);
  });
  btnEnd?.addEventListener('click', endSession);
  window.addEventListener('tree:new-chat', resetChat);

  if (recognition) {
    btnVoice?.addEventListener('click', () => {
      try { recognition.start(); btnVoice.classList.add('recording'); } catch { /* noop */ }
    });
    recognition.onresult = (ev) => {
      const last = ev.results[ev.results.length - 1];
      const text = (last[0]?.transcript || '').trim();
      btnVoice?.classList.remove('recording');
      handleUserInput(text);
    };
    recognition.onerror = () => btnVoice?.classList.remove('recording');
    recognition.onend = () => btnVoice?.classList.remove('recording');
  }

  /* ── Language sync ── */
  function syncLanguageUI() {
    const u = starDetail?.querySelector('.fd-user .fd-label');
    const a = starDetail?.querySelector('.fd-ai .fd-label');
    if (u) u.textContent = t('detailUser');
    if (a) a.textContent = t('detailAI');
    msgStream?.querySelectorAll('.imm-msg .msg-role').forEach((el) => {
      const p = el.closest('.imm-msg');
      if (!p) return;
      el.textContent = p.classList.contains('user-msg') ? t('me') : t('ai');
    });
  }
  window.addEventListener('app:lang-change', syncLanguageUI);

  bindPanel(api);
  return { resetChat };
}

/* ── Panel bindings ── */
function bindPanel(api) {
  const bind = (id, fn) => {
    const el = document.getElementById(id);
    if (!el) return;
    const apply = () => fn(parseFloat(el.value));
    el.addEventListener('input', apply);
    apply();
  };
  bind('sl-point', (v) => { if (api.morphUniforms) api.morphUniforms.uPointSize.value = v; });
  bind('sl-spread', (v) => { if (api.morphUniforms) api.morphUniforms.uSpread.value = v; });
  bind('sl-mouse-force', (v) => { api.simUniforms.uAttractBoost.value = v / 2.8; });
  bind('sl-line-op', (v) => { api.simUniforms.uLineOpacityMul.value = v; });
  bind('sl-line-bright', (v) => { api.simUniforms.uLineBrightness.value = v; });
  bind('sl-bloom', (v) => { api.bloomPass.strength = v; });
  bind('sl-after', (v) => { const u = api.afterimagePass.uniforms; if (u?.damp) u.damp.value = v; });

  document.querySelectorAll('.shape-btn').forEach((btn) => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.shape-btn').forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
      api.switchShape?.(btn.dataset.shape);
    });
  });

  const clA = document.getElementById('cl-a');
  const clB = document.getElementById('cl-b');
  if (clA) clA.addEventListener('input', () => { api.morphUniforms?.uColor1.value.set(clA.value); });
  if (clB) clB.addEventListener('input', () => { api.morphUniforms?.uColor2.value.set(clB.value); });
}

function createRecognition() {
  const SR = typeof window !== 'undefined' ? window.SpeechRecognition || window.webkitSpeechRecognition : null;
  if (!SR) return null;
  const r = new SR();
  r.lang = getLang() === 'en' ? 'en-US' : 'zh-CN';
  r.continuous = false;
  r.interimResults = false;
  r.maxAlternatives = 1;
  window.addEventListener('app:lang-change', (e) => {
    r.lang = e?.detail?.lang === 'en' ? 'en-US' : 'zh-CN';
  });
  return r;
}

// === core-entry.js ===
/**
 * core-entry.js — 形态变换粒子系统 (星云/爱心/土星/烟花)
 * GPGPU 星座连线 + Bloom / Afterimage / ACES
 */

const SIZE = PARTICLE_SIM_TEXTURE_SIZE;
const COUNT = SIZE * SIZE;
const SIM_TEX_TYPE = THREE.HalfFloatType;

function gaussRand() {
  let u = 0, v = 0;
  while (u === 0) u = Math.random();
  while (v === 0) v = Math.random();
  return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
}

/* ═══ Shape generators ═══ */

function genNebulaShape() {
  const d = new Float32Array(COUNT * 4);
  for (let i = 0; i < COUNT; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = Math.abs(gaussRand()) * 3.2;
    d[i * 4] = Math.cos(a) * r;
    d[i * 4 + 1] = Math.sin(a) * r * 0.65;
    d[i * 4 + 2] = gaussRand() * 1.2;
    d[i * 4 + 3] = Math.random();
  }
  return d;
}

function genHeartShape() {
  const d = new Float32Array(COUNT * 4);
  const S = 0.21;
  for (let i = 0; i < COUNT; i++) {
    const t = Math.random() * Math.PI * 2;
    let x = 16 * Math.pow(Math.sin(t), 3) * S;
    let y = (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) * S;
    x += gaussRand() * 0.2;
    y += gaussRand() * 0.2;
    const z = gaussRand() * 0.12;
    d[i * 4] = x;
    d[i * 4 + 1] = y;
    d[i * 4 + 2] = z;
    d[i * 4 + 3] = Math.random();
  }
  return d;
}

function genSaturnShape() {
  const d = new Float32Array(COUNT * 4);
  const sphereN = Math.floor(COUNT * 0.55);
  const TILT = 26 * Math.PI / 180;
  const CT = Math.cos(TILT), ST = Math.sin(TILT);
  for (let i = 0; i < COUNT; i++) {
    let x, y, z;
    if (i < sphereN) {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = 1.5 * (0.85 + 0.15 * Math.random());
      x = Math.sin(phi) * Math.cos(theta) * r;
      y = Math.cos(phi) * r * 0.88;
      z = Math.sin(phi) * Math.sin(theta) * r;
    } else {
      const angle = Math.random() * Math.PI * 2;
      const ringR = 2.2 + Math.random() * 1.6;
      x = Math.cos(angle) * ringR;
      y = (Math.random() - 0.5) * 0.04;
      z = Math.sin(angle) * ringR;
    }
    const ry = y * CT - z * ST;
    const rz = y * ST + z * CT;
    d[i * 4] = x;
    d[i * 4 + 1] = ry;
    d[i * 4 + 2] = rz;
    d[i * 4 + 3] = Math.random();
  }
  return d;
}

function genFireworkShape() {
  const d = new Float32Array(COUNT * 4);
  const BURSTS = 7;
  const centers = [];
  for (let b = 0; b < BURSTS; b++) {
    centers.push({
      x: (Math.random() - 0.5) * 5.5,
      y: Math.random() * 3.5 - 0.8,
      z: (Math.random() - 0.5) * 2,
    });
  }
  for (let i = 0; i < COUNT; i++) {
    const c = centers[i % BURSTS];
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = Math.pow(Math.random(), 0.6) * 1.8;
    d[i * 4] = c.x + Math.sin(phi) * Math.cos(theta) * r;
    d[i * 4 + 1] = c.y + Math.cos(phi) * r - Math.pow(r, 1.5) * 0.12;
    d[i * 4 + 2] = c.z + Math.sin(phi) * Math.sin(theta) * r * 0.5;
    d[i * 4 + 3] = Math.random();
  }
  return d;
}

/* ═══ Main ═══ */

async function main() {
  const canvas = document.getElementById('main-canvas');
  if (!canvas) return;

  /* ── Renderer ── */
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, alpha: false, powerPreference: 'high-performance' });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  renderer.outputColorSpace = THREE.SRGBColorSpace;

  /* ── Scene ── */
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000011);

  /* ── Camera ── */
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
  camera.position.set(0, 0, 8);

  /* ── Shared uniforms ── */
  const sharedUniforms = {
    uTime: { value: 0 },
    uGrowthProgress: { value: 0 },
  };

  /* ── Background starfield (tree.js) ── */
  const treeApi = initTree(scene, sharedUniforms);

  /* ── GPGPU setup ── */
  const simUniforms = createParticleSimUniforms();

  const mkRT = () =>
    new THREE.WebGLRenderTarget(SIZE, SIZE, {
      minFilter: THREE.NearestFilter,
      magFilter: THREE.NearestFilter,
      format: THREE.RGBAFormat,
      type: SIM_TEX_TYPE,
      depthBuffer: false,
      stencilBuffer: false,
    });

  /* ── Generate shape data ── */
  const nebulaData = genNebulaShape();
  const heartData = genHeartShape();
  const saturnData = genSaturnShape();
  const fireworkData = genFireworkShape();

  const mkTex = (data) => {
    const t = new THREE.DataTexture(data, SIZE, SIZE, THREE.RGBAFormat, SIM_TEX_TYPE);
    t.needsUpdate = true;
    t.magFilter = THREE.NearestFilter;
    t.minFilter = THREE.NearestFilter;
    return t;
  };

  const shapes = {
    nebula: mkTex(nebulaData),
    heart: mkTex(heartData),
    saturn: mkTex(saturnData),
    firework: mkTex(fireworkData),
  };
  let currentShapeName = 'nebula';

  /* ── Initialize GPGPU buffers from nebula shape ── */
  const initPos = new Float32Array(COUNT * 4);
  const initVel = new Float32Array(COUNT * 4);
  for (let i = 0; i < COUNT; i++) {
    initPos[i * 4] = nebulaData[i * 4] + (Math.random() - 0.5) * 0.2;
    initPos[i * 4 + 1] = nebulaData[i * 4 + 1] + (Math.random() - 0.5) * 0.2;
    initPos[i * 4 + 2] = nebulaData[i * 4 + 2] + (Math.random() - 0.5) * 0.2;
    initPos[i * 4 + 3] = 0.4 + Math.random() * 0.6;
    initVel[i * 4 + 3] = 1;
  }

  const posRT = [mkRT(), mkRT()];
  const velRT = [mkRT(), mkRT()];
  simUniforms.tPos.value = mkTex(initPos);
  simUniforms.tVel.value = mkTex(initVel);
  simUniforms.tTarget.value = shapes.nebula;

  const velMat = createVelocityStepMaterial(simUniforms);
  const posMat = createPositionStepMaterial(simUniforms);
  const quadMesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), velMat);
  const simScene = new THREE.Scene();
  simScene.add(quadMesh);
  const simCam = new THREE.OrthographicCamera(-1, 1, 1, -1, -1, 1);

  /* ── Constellation lines ── */
  const constellationSystem = createConstellationLines(scene);

  /* ── Inspiration stars ── */
  const inspirationStarSystem = createInspirationStarSystem(scene, camera, renderer.domElement);

  /* ── Read-back buffer ── */
  const readBuf = new Float32Array(COUNT * 4);
  function readParticlePositions() {
    renderer.readRenderTargetPixels(posRT[0], 0, 0, SIZE, SIZE, readBuf);
    return readBuf;
  }

  /* ── GPGPU step ── */
  function gpgpuStep(dt, t) {
    simUniforms.uDelta.value = dt;
    simUniforms.uTime.value = t;
    simUniforms.uPhase.value = getPhaseId();
    simUniforms.uTypingPulse.value *= 0.92;
    sharedUniforms.uTime.value = t;

    quadMesh.material = velMat;
    renderer.setRenderTarget(velRT[1]);
    renderer.render(simScene, simCam);
    [velRT[0], velRT[1]] = [velRT[1], velRT[0]];
    simUniforms.tVel.value = velRT[0].texture;

    quadMesh.material = posMat;
    renderer.setRenderTarget(posRT[1]);
    renderer.render(simScene, simCam);
    [posRT[0], posRT[1]] = [posRT[1], posRT[0]];
    simUniforms.tPos.value = posRT[0].texture;

    renderer.setRenderTarget(null);
  }

  /* ══════════════════════════════════════════════════════
     Morphing particle render system
     ══════════════════════════════════════════════════════ */
  const morphUniforms = {
    tShapeA: { value: shapes.nebula },
    tShapeB: { value: shapes.nebula },
    uMorphProgress: { value: 0 },
    uPointSize: { value: 1.5 },
    uTime: sharedUniforms.uTime,
    uMouse: { value: new THREE.Vector2(0, 0) },
    uMouseActive: { value: 0 },
    uSpread: { value: 1.0 },
    uColor1: { value: new THREE.Color('#2266ff') },
    uColor2: { value: new THREE.Color('#9944dd') },
  };

  const pGeo = new THREE.BufferGeometry();
  const dummyPos = new Float32Array(COUNT * 3);
  pGeo.setAttribute('position', new THREE.BufferAttribute(dummyPos, 3));
  const refs = new Float32Array(COUNT * 2);
  for (let i = 0; i < COUNT; i++) {
    refs[i * 2] = (i % SIZE + 0.5) / SIZE;
    refs[i * 2 + 1] = (Math.floor(i / SIZE) + 0.5) / SIZE;
  }
  pGeo.setAttribute('reference', new THREE.BufferAttribute(refs, 2));

  const particleMaterial = new THREE.ShaderMaterial({
    uniforms: morphUniforms,
    vertexShader: /* glsl */ `
      uniform sampler2D tShapeA;
      uniform sampler2D tShapeB;
      uniform float uMorphProgress;
      uniform float uPointSize;
      uniform float uTime;
      uniform vec2 uMouse;
      uniform float uMouseActive;
      uniform float uSpread;
      uniform vec3 uColor1;
      uniform vec3 uColor2;
      attribute vec2 reference;
      varying vec3 vColor;
      varying float vAlpha;

      float h11(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }

      void main(){
        float seed = h11(reference * 57.0);

        vec4 dA = texture2D(tShapeA, reference);
        vec4 dB = texture2D(tShapeB, reference);
        float bseed = mix(dA.w, dB.w, uMorphProgress);

        vec3 pos = mix(dA.xyz, dB.xyz, uMorphProgress) * uSpread;

        if(uMouseActive > 0.01){
          vec3 mouseW = vec3(uMouse.x * 6.0, uMouse.y * 4.0, 0.0);
          vec3 toM = mouseW - pos;
          float mDist = length(toM);
          float attract = smoothstep(6.0, 0.3, mDist) * uMouseActive * 0.3;
          pos += toM * attract;
        }

        pos += vec3(
          sin(uTime * 0.3 + seed * 20.0),
          cos(uTime * 0.25 + seed * 15.0),
          sin(uTime * 0.35 + seed * 25.0)
        ) * 0.06;

        vColor = mix(uColor1, uColor2, seed);

        float bright = 0.92;
        if(bseed > 0.97) bright = 1.8;
        else if(bseed > 0.92) bright = 1.35;
        else if(bseed > 0.86) bright = 1.12;
        vColor *= bright;

        float twinkle = 0.5 + 0.5 * sin(uTime * (0.3 + seed * 1.5) + seed * 50.0);
        twinkle = twinkle * twinkle;
        vAlpha = twinkle * 0.9;

        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
        gl_Position = projectionMatrix * mv;
        float sz = uPointSize * (0.3 + seed * 0.7);
        if(bseed > 0.92) sz *= 2.0;
        gl_PointSize = clamp(sz * (24.0 / max(3.0, -mv.z)), 0.8, 7.5);
      }
    `,
    fragmentShader: /* glsl */ `
      varying vec3 vColor;
      varying float vAlpha;
      void main(){
        float d = length(gl_PointCoord - 0.5);
        float alpha = smoothstep(0.5, 0.02, d);
        if(alpha < 0.01) discard;
        gl_FragColor = vec4(vColor, alpha * vAlpha * 0.62);
      }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    depthTest: false,
  });

  const particlePoints = new THREE.Points(pGeo, particleMaterial);
  particlePoints.frustumCulled = false;
  particlePoints.renderOrder = 0;
  scene.add(particlePoints);

  // Fallback dense stardust layer: guarantees visible particles on
  // devices where the main GPGPU/morph layer appears too dim or unstable.
  const FB_COUNT = 18000;
  const fbPos = new Float32Array(FB_COUNT * 3);
  const fbSeed = new Float32Array(FB_COUNT);
  for (let i = 0; i < FB_COUNT; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = Math.pow(Math.random(), 0.65) * 11.0;
    fbPos[i * 3] = Math.cos(a) * r + (Math.random() - 0.5) * 0.9;
    fbPos[i * 3 + 1] = Math.sin(a) * r * 0.72 + (Math.random() - 0.5) * 0.9;
    fbPos[i * 3 + 2] = (Math.random() - 0.5) * 4.2;
    fbSeed[i] = Math.random();
  }
  const fbGeo = new THREE.BufferGeometry();
  fbGeo.setAttribute('position', new THREE.BufferAttribute(fbPos, 3));
  fbGeo.setAttribute('aSeed', new THREE.BufferAttribute(fbSeed, 1));
  const fbMat = new THREE.ShaderMaterial({
    uniforms: {
      uTime: sharedUniforms.uTime,
      uColor1: morphUniforms.uColor1,
      uColor2: morphUniforms.uColor2,
      uOpacity: { value: 0.62 },
    },
    vertexShader: /* glsl */ `
      uniform float uTime;
      attribute float aSeed;
      varying vec3 vColor;
      varying float vA;
      void main(){
        vec3 p = position;
        p.xy += vec2(
          sin(uTime * 0.25 + aSeed * 31.0),
          cos(uTime * 0.22 + aSeed * 27.0)
        ) * 0.03;
        vec4 mv = modelViewMatrix * vec4(p, 1.0);
        gl_Position = projectionMatrix * mv;
        gl_PointSize = clamp((0.8 + aSeed * 1.8) * (26.0 / max(3.0, -mv.z)), 0.6, 5.0);
        vA = 0.35 + 0.65 * (0.5 + 0.5 * sin(uTime * (0.4 + aSeed) + aSeed * 17.0));
      }
    `,
    fragmentShader: /* glsl */ `
      uniform vec3 uColor1;
      uniform vec3 uColor2;
      uniform float uOpacity;
      varying float vA;
      varying vec3 vColor;
      void main(){
        float d = length(gl_PointCoord - 0.5);
        float a = smoothstep(0.5, 0.06, d);
        if(a < 0.01) discard;
        vec3 c = mix(uColor1, uColor2, fract(gl_FragCoord.x * 0.017 + gl_FragCoord.y * 0.013));
        gl_FragColor = vec4(c, a * vA * uOpacity);
      }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    depthTest: false,
  });
  const fallbackDust = new THREE.Points(fbGeo, fbMat);
  fallbackDust.frustumCulled = false;
  fallbackDust.renderOrder = -1;
  scene.add(fallbackDust);

  // Dreamy color nebula layers (large, low-alpha particles)
  function makeNebulaLayer(count, radius, zSpan, sizeMul, opacity, c1, c2) {
    const nPos = new Float32Array(count * 3);
    const nSeed = new Float32Array(count);
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const r = Math.pow(Math.random(), 0.78) * radius;
      nPos[i * 3] = Math.cos(a) * r + (Math.random() - 0.5) * 8.0;
      nPos[i * 3 + 1] = Math.sin(a) * r * 0.75 + (Math.random() - 0.5) * 6.0;
      nPos[i * 3 + 2] = (Math.random() - 0.5) * zSpan;
      nSeed[i] = Math.random();
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(nPos, 3));
    geo.setAttribute('aSeed', new THREE.BufferAttribute(nSeed, 1));
    const mat = new THREE.ShaderMaterial({
      uniforms: {
        uTime: sharedUniforms.uTime,
        uOpacity: { value: opacity },
        uColorA: { value: new THREE.Color(c1) },
        uColorB: { value: new THREE.Color(c2) },
        uSizeMul: { value: sizeMul },
      },
      vertexShader: /* glsl */ `
        uniform float uTime;
        uniform float uSizeMul;
        attribute float aSeed;
        varying float vA;
        varying float vMix;
        void main(){
          vec3 p = position;
          p.x += sin(uTime * 0.06 + aSeed * 31.0) * 0.5;
          p.y += cos(uTime * 0.05 + aSeed * 27.0) * 0.35;
          vec4 mv = modelViewMatrix * vec4(p, 1.0);
          gl_Position = projectionMatrix * mv;
          gl_PointSize = clamp((4.0 + aSeed * 9.0) * uSizeMul * (16.0 / max(4.0, -mv.z)), 1.5, 18.0);
          vA = 0.35 + 0.65 * (0.5 + 0.5 * sin(uTime * (0.08 + aSeed * 0.2) + aSeed * 12.0));
          vMix = aSeed;
        }
      `,
      fragmentShader: /* glsl */ `
        uniform float uOpacity;
        uniform vec3 uColorA;
        uniform vec3 uColorB;
        varying float vA;
        varying float vMix;
        void main(){
          float d = length(gl_PointCoord - 0.5);
          float soft = smoothstep(0.5, 0.02, d);
          if(soft < 0.01) discard;
          vec3 c = mix(uColorA, uColorB, vMix);
          gl_FragColor = vec4(c, soft * vA * uOpacity);
        }
      `,
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      depthTest: false,
    });
    const pts = new THREE.Points(geo, mat);
    pts.frustumCulled = false;
    return pts;
  }
  const nebulaLayerA = makeNebulaLayer(9000, 20.0, 14.0, 1.0, 0.06, '#6a2cff', '#22b8ff');
  const nebulaLayerB = makeNebulaLayer(7000, 16.0, 12.0, 0.85, 0.05, '#ff4fd8', '#6a7dff');
  nebulaLayerA.renderOrder = -3;
  nebulaLayerB.renderOrder = -2;
  scene.add(nebulaLayerA);
  scene.add(nebulaLayerB);

  /* ── Shape switching ── */
  function switchShape(name) {
    if (!shapes[name] || name === currentShapeName) return;
    morphUniforms.tShapeA.value = shapes[currentShapeName];
    morphUniforms.tShapeB.value = shapes[name];
    morphUniforms.uMorphProgress.value = 0;
    gsap.killTweensOf(morphUniforms.uMorphProgress);
    gsap.to(morphUniforms.uMorphProgress, {
      value: 1,
      duration: 2.0,
      ease: 'power2.inOut',
      onComplete() {
        morphUniforms.tShapeA.value = shapes[name];
        morphUniforms.uMorphProgress.value = 0;
        currentShapeName = name;
      },
    });
    simUniforms.tTarget.value = shapes[name];
  }

  /* ── Post-processing ── */
  const composer = new EffectComposer(renderer);
  composer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  composer.addPass(new RenderPass(scene, camera));

  const bloomPass = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    0.9, 0.8, 0.3,
  );
  composer.addPass(bloomPass);

  const afterimagePass = new AfterimagePass(0.12);
  composer.addPass(afterimagePass);
  composer.addPass(new OutputPass());

  /* ── Camera orbit ── */
  const camRig = { breathe: 0, nudge: 0 };
  gsap.to(camRig, { breathe: 0.1, duration: 6, yoyo: true, repeat: -1, ease: 'sine.inOut' });

  function updateCamera() {
    const rad = 8 + camRig.breathe + camRig.nudge;
    camera.position.set(0, 0, rad);
    camera.lookAt(0, 0, 0);
  }

  /* ── Resize ── */
  function onResize() {
    const w = window.innerWidth, h = window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
    composer.setSize(w, h);
    composer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    bloomPass.resolution.set(w, h);
  }
  window.addEventListener('resize', onResize);

  /* ── Mouse interaction ── */
  const mouseNDC = new THREE.Vector2(0, 0);
  const mouseRaycaster = new THREE.Raycaster();
  let mouseInCanvas = false;
  let targetRotationY = 0;
  let currentRotationY = 0;

  renderer.domElement.addEventListener('mousemove', (e) => {
    mouseNDC.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouseNDC.y = -(e.clientY / window.innerHeight) * 2 + 1;
    mouseInCanvas = true;
    targetRotationY = mouseNDC.x * Math.PI * 0.12;
    morphUniforms.uMouse.value.set(mouseNDC.x, mouseNDC.y);
    treeApi.setPointer(mouseNDC.x, mouseNDC.y);
  });

  renderer.domElement.addEventListener('mouseleave', () => {
    mouseInCanvas = false;
    treeApi.setPointer(0, 0);
  });

  renderer.domElement.addEventListener('pointerdown', (e) => {
    const hitStar = inspirationStarSystem.handlePointer(e.clientX, e.clientY);
    if (!hitStar) {
      simUniforms.uClickPulse.value = 1.4;
    }
  });

  renderer.domElement.addEventListener('touchmove', (e) => {
    const touch = e.touches[0];
    if (!touch) return;
    mouseNDC.x = (touch.clientX / window.innerWidth) * 2 - 1;
    mouseNDC.y = -(touch.clientY / window.innerHeight) * 2 + 1;
    mouseInCanvas = true;
    targetRotationY = mouseNDC.x * Math.PI * 0.12;
    morphUniforms.uMouse.value.set(mouseNDC.x, mouseNDC.y);
  }, { passive: true });

  renderer.domElement.addEventListener('touchend', () => { mouseInCanvas = false; });

  function updateMouse() {
    if (mouseInCanvas) {
      morphUniforms.uMouseActive.value = THREE.MathUtils.lerp(morphUniforms.uMouseActive.value, 1.0, 0.12);
      mouseRaycaster.setFromCamera(mouseNDC, camera);
      const dir = mouseRaycaster.ray.direction;
      const orig = mouseRaycaster.ray.origin;
      const tVal = -orig.dot(dir) / dir.dot(dir);
      const closest = orig.clone().addScaledVector(dir, Math.max(0, tVal));
      simUniforms.uMouseWorld.value.copy(closest);
      simUniforms.uMouseActive.value = THREE.MathUtils.lerp(simUniforms.uMouseActive.value, 1.0, 0.12);
    } else {
      morphUniforms.uMouseActive.value *= 0.94;
      simUniforms.uMouseActive.value *= 0.94;
    }
    simUniforms.uClickPulse.value *= 0.91;
  }

  /* ── Animate ── */
  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.06);
    const t = clock.elapsedTime;

    updateMouse();
    gpgpuStep(dt, t);

    currentRotationY += (targetRotationY - currentRotationY) * 0.06;
    particlePoints.rotation.y = currentRotationY;
    particlePoints.rotation.z += 0.0003;
    fallbackDust.rotation.y = currentRotationY * 0.35;
    fallbackDust.rotation.z -= 0.00018;
    nebulaLayerA.rotation.y += 0.00008;
    nebulaLayerA.rotation.z -= 0.00003;
    nebulaLayerB.rotation.y -= 0.00006;
    nebulaLayerB.rotation.z += 0.00002;

    constellationSystem.update(t, simUniforms);
    inspirationStarSystem.update(t);
    updateCamera();
    composer.render(dt);
  }

  /* ── Intro animation ── */
  function playIntroAnimation() {
    bloomPass.strength = 1.25;
    gsap.to(bloomPass, { strength: 0.9, duration: 3.0, ease: 'power1.out' });
    const overlay = document.getElementById('intro-overlay');
    if (overlay) gsap.delayedCall(0.4, () => overlay.classList.add('fade-out'));
  }

  /* ── API for controls ── */
  const api = {
    simUniforms,
    sharedUniforms,
    particleMaterial,
    morphUniforms,
    treeApi,
    camera,
    bloomPass,
    afterimagePass,
    constellationSystem,
    inspirationStarSystem,
    readParticlePositions,
    texSize: SIZE,
    switchShape,
  };

  initControls(api, camRig);
  playIntroAnimation();
  animate();
}

main().catch(console.error);
  </script>

        window.__APP_LANG = lang;

      var currentLang = getLang();
      applyLang(currentLang);
      document.getElementById('btn-lang-toggle')?.addEventListener('click', function () {
        currentLang = currentLang === 'zh' ? 'en' : 'zh';

    document.getElementById('btn-panel-toggle')?.addEventListener('click', function(){
