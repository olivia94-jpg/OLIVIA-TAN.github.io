<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>GLB → Particle Tree</title>
<style>
  *{margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden;background:#050510}
  canvas{display:block}
  #ui{
    position:fixed;bottom:1.4rem;left:50%;transform:translateX(-50%);
    display:flex;flex-direction:column;align-items:center;gap:.6rem;
    font-family:system-ui,sans-serif;color:#ccc;font-size:13px;z-index:10;
  }
  #ui label{display:flex;align-items:center;gap:.5rem}
  #ui input[type=range]{width:220px;accent-color:#e8a060}
  #ui .val{min-width:38px;text-align:right;font-variant-numeric:tabular-nums}
  #info{
    position:fixed;top:.8rem;left:50%;transform:translateX(-50%);
    font-family:system-ui,sans-serif;color:#777;font-size:12px;z-index:10;
  }
</style>
<script type="importmap">
{
  "imports":{
    "three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="info">Loading tree.glb …</div>
<div id="ui">
  <label>
    <span>Dissolve</span>
    <input type="range" id="sl-progress" min="0" max="1" step="0.005" value="0"/>
    <span class="val" id="lb-progress">0.00</span>
  </label>
  <label>
    <span>Speed</span>
    <input type="range" id="sl-speed" min="0" max="3" step="0.05" value="1"/>
    <span class="val" id="lb-speed">1.00</span>
  </label>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.01, 100);
camera.position.set(0, 1.2, 3.5);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.target.set(0, 0.6, 0);
controls.update();

/* ── Extract all mesh vertices from a GLTF scene ── */
function extractVertices(gltfScene) {
  const verts = [];
  gltfScene.traverse((child) => {
    if (!child.isMesh) return;
    const geo = child.geometry;
    const pos = geo.attributes.position;
    if (!pos) return;
    child.updateWorldMatrix(true, false);
    const m = child.matrixWorld;
    const v = new THREE.Vector3();
    for (let i = 0; i < pos.count; i++) {
      v.fromBufferAttribute(pos, i).applyMatrix4(m);
      verts.push(v.x, v.y, v.z);
    }
  });
  return new Float32Array(verts);
}

/* ── Build a random unit-sphere direction per vertex (for dissolve) ── */
function buildRandomDirs(count) {
  const arr = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    arr[i * 3]     = Math.sin(phi) * Math.cos(theta);
    arr[i * 3 + 1] = Math.sin(phi) * Math.sin(theta);
    arr[i * 3 + 2] = Math.cos(phi);
  }
  return arr;
}

/* ── Build per-vertex random seeds (for jitter / phase offsets) ── */
function buildSeeds(count) {
  const arr = new Float32Array(count);
  for (let i = 0; i < count; i++) arr[i] = Math.random();
  return arr;
}

/* ── Particle ShaderMaterial ── */
function createParticleMaterial() {
  return new THREE.ShaderMaterial({
    uniforms: {
      uTime:     { value: 0 },
      uProgress: { value: 0 },
      uSize:     { value: 3.2 },
    },
    vertexShader: /* glsl */`
      uniform float uTime;
      uniform float uProgress;
      uniform float uSize;

      attribute vec3 aDir;
      attribute float aSeed;

      varying float vAlpha;
      varying float vDist;

      /* simple 3-component pseudo noise */
      vec3 noiseOffset(vec3 p, float t, float seed){
        float s = seed * 6.2831;
        return vec3(
          sin(t * 1.1 + p.y * 2.3 + s) * 0.012,
          cos(t * 0.9 + p.x * 2.7 + s + 1.0) * 0.015,
          sin(t * 1.3 + p.z * 2.1 + s + 2.0) * 0.012
        );
      }

      void main(){
        float prog = uProgress;

        /* dissolve: move along random direction, scaled by progress */
        float dissolveRadius = 1.2 + aSeed * 0.8;
        vec3 dissolved = position + aDir * prog * dissolveRadius;

        /* micro-jitter on model surface (when not dissolved) */
        vec3 jitter = noiseOffset(position, uTime, aSeed) * (1.0 - prog * 0.7);

        vec3 finalPos = dissolved + jitter;

        vec4 mv = modelViewMatrix * vec4(finalPos, 1.0);
        gl_Position = projectionMatrix * mv;

        float persp = 280.0 / max(-mv.z, 0.8);
        gl_PointSize = clamp(uSize * persp * (0.65 + aSeed * 0.35), 1.0, 18.0);

        vAlpha = 1.0 - prog * (0.6 + aSeed * 0.4);
        vDist  = length(finalPos);
      }
    `,
    fragmentShader: /* glsl */`
      precision highp float;
      varying float vAlpha;
      varying float vDist;
      void main(){
        vec2 c = gl_PointCoord - 0.5;
        float d = length(c);
        if(d > 0.5) discard;

        /* soft glow falloff */
        float soft = exp(-d * 6.0);
        float rim  = exp(-d * 14.0) * 0.3;

        /* warm gold→cyan color based on height stored in vDist */
        vec3 gold = vec3(1.0, 0.92, 0.72);
        vec3 cyan = vec3(0.55, 0.9, 1.0);
        vec3 col  = mix(gold, cyan, smoothstep(0.0, 2.0, vDist));

        gl_FragColor = vec4(col * (0.85 + rim), vAlpha * soft);
      }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    depthTest: true,
  });
}

/* ── Load model & build particle system ── */
const loader = new GLTFLoader();
let points = null;
let material = null;

loader.load(
  './tree.glb',
  (gltf) => {
    const baseVerts = extractVertices(gltf.scene);
    const count = baseVerts.length / 3;

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(baseVerts, 3));
    geo.setAttribute('aDir',     new THREE.BufferAttribute(buildRandomDirs(count), 3));
    geo.setAttribute('aSeed',    new THREE.BufferAttribute(buildSeeds(count), 1));

    material = createParticleMaterial();
    points = new THREE.Points(geo, material);
    scene.add(points);

    document.getElementById('info').textContent =
      `${count.toLocaleString()} particles from tree.glb`;

    /* auto-center camera target based on model bounding box */
    const box = new THREE.Box3().setFromBufferAttribute(geo.attributes.position);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    controls.target.copy(center);
    camera.position.set(center.x, center.y + size.y * 0.3, center.z + size.y * 1.6);
    controls.update();
  },
  undefined,
  (err) => {
    document.getElementById('info').textContent =
      'Failed to load tree.glb – place the file next to this HTML';
    console.error(err);
  }
);

/* ── UI bindings ── */
const slProgress = document.getElementById('sl-progress');
const lbProgress = document.getElementById('lb-progress');
const slSpeed    = document.getElementById('sl-speed');
const lbSpeed    = document.getElementById('lb-speed');
let animSpeed = 1;

slProgress.addEventListener('input', () => {
  lbProgress.textContent = parseFloat(slProgress.value).toFixed(2);
});
slSpeed.addEventListener('input', () => {
  animSpeed = parseFloat(slSpeed.value);
  lbSpeed.textContent = animSpeed.toFixed(2);
});

/* ── Resize ── */
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* ── Render loop ── */
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.06);
  const t  = clock.elapsedTime;

  if (material) {
    material.uniforms.uTime.value = t * animSpeed;
    material.uniforms.uProgress.value = parseFloat(slProgress.value);
  }

  if (points) {
    points.rotation.y += dt * 0.12 * animSpeed;
  }

  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
