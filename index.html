<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星空灵感 · Starfield Inspiration</title>
  <style>
    :root {
      --bg-solid: #08081a;
      --bg-panel: #0e0e24;
      --bg-input: #141430;
      --border: #2a2850;
      --border-glow: #6080d0;
      --text: #d0d8f0;
      --text-dim: #7880a8;
      --accent: #6898e8;
      --accent-soft: rgba(104,152,232,0.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000005; font-family: "Segoe UI", system-ui, -apple-system, sans-serif; color: var(--text); }
    #canvas-wrap { position: fixed; inset: 0; z-index: 0; }
    #main-canvas { display: block; width: 100%; height: 100%; }

    /* ===== 开屏引导 ===== */
    #splash-text {
      position: fixed; top: 42%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.25rem; color: #90b8f0;
      text-shadow: 0 0 28px rgba(100,140,220,0.25), 0 2px 10px rgba(0,0,0,0.6);
      opacity: 0; animation: splashIn 2s ease-out 1.8s forwards;
      z-index: 14; pointer-events: none;
      letter-spacing: 0.12em; text-align: center; line-height: 1.9;
    }
    #splash-text.hidden { animation: splashOut 0.8s ease-in forwards !important; }
    @keyframes splashIn { from { opacity:0; transform:translate(-50%,-50%) translateY(14px); } to { opacity:1; transform:translate(-50%,-50%) translateY(0); } }
    @keyframes splashOut { to { opacity:0; transform:translate(-50%,-50%) translateY(-18px); } }

    /* ===== 沉浸式消息流 ===== */
    #msg-stream {
      position: fixed; bottom: 105px; left: 50%; transform: translateX(-50%);
      width: min(88vw, 560px); max-height: 46vh; overflow: hidden;
      display: flex; flex-direction: column; justify-content: flex-end; gap: 0.55rem;
      pointer-events: none; z-index: 12; padding: 0 0.5rem;
      mask-image: linear-gradient(to bottom, transparent 0%, black 20%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 20%);
    }
    .imm-msg { padding: 0.2rem 0; font-size: 15px; line-height: 1.65; text-shadow: 0 1px 10px rgba(0,0,0,0.65); animation: msgIn 0.55s ease-out; transition: opacity 2.5s ease; max-width: 88%; }
    .imm-msg.user-msg { color: #b8d4ff; align-self: flex-end; text-align: right; }
    .imm-msg.ai-msg   { color: #c8d8ff; align-self: flex-start; text-align: left; }
    .imm-msg .msg-role { font-size: 10px; opacity: 0.4; margin-bottom: 2px; }
    .imm-msg.fading    { opacity: 0.08; }
    @keyframes msgIn { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }

    /* ===== 灵感星详情弹窗 ===== */
    #fruit-detail {
      display: none; position: fixed;
      width: min(86vw, 320px); padding: 1rem 1.1rem; border-radius: 14px;
      background: rgba(14,14,36,0.96); border: 1px solid var(--border);
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
      z-index: 46; font-size: 13px; line-height: 1.55; color: var(--text);
      pointer-events: auto; backdrop-filter: blur(14px);
    }
    #fruit-detail.visible { display: block; }
    #fruit-detail .fd-user { color: #a0c8ff; margin-bottom: 0.5rem; }
    #fruit-detail .fd-ai   { color: #b8c8f0; }
    #fruit-detail .fd-label { font-size: 10px; opacity: 0.42; margin-bottom: 2px; }

    /* ===== 底部输入 ===== */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 15;
      display: flex; flex-direction: column; align-items: center; gap: 0.35rem;
      padding: 0.55rem 1rem 0.9rem;
      background: linear-gradient(to top, rgba(8,8,26,0.9) 42%, transparent);
      pointer-events: auto;
    }
    .input-row { display: flex; width: min(90vw, 520px); gap: 0.4rem; align-items: center; }
    #text-input {
      flex: 1; height: 42px; padding: 0 1rem; border-radius: 21px;
      border: 1px solid rgba(42,40,80,0.55);
      background: rgba(20,20,48,0.6); color: var(--text); font-size: 14px;
      outline: none; transition: border-color 0.3s, box-shadow 0.3s;
      backdrop-filter: blur(8px);
    }
    #text-input::placeholder { color: var(--text-dim); }
    #text-input:focus { border-color: var(--border-glow); box-shadow: 0 0 14px rgba(80,120,200,0.15); }
    .icon-btn {
      width: 42px; height: 42px; border-radius: 50%;
      border: 1px solid rgba(42,40,80,0.55);
      background: rgba(20,20,48,0.45); color: var(--text);
      cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.25s, box-shadow 0.25s;
    }
    .icon-btn:hover { background: rgba(30,30,68,0.65); border-color: var(--border-glow); box-shadow: 0 0 10px rgba(80,120,200,0.12); }
    .icon-btn.primary { background: rgba(30,40,80,0.65); border-color: var(--border-glow); }
    .icon-btn.recording { border-color: #e06050; box-shadow: 0 0 16px rgba(224,96,80,0.3); animation: pulse-rec 1.1s ease-in-out infinite; }
    @keyframes pulse-rec { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
    .action-row { display: flex; gap: 0.6rem; align-items: center; }
    .subtle-btn {
      background: none; border: none; color: var(--text-dim); font-size: 12px;
      cursor: pointer; padding: 0.3rem 0.65rem; border-radius: 8px;
      transition: color 0.2s, background 0.2s; white-space: nowrap;
    }
    .subtle-btn:hover { color: var(--text); background: rgba(104,152,232,0.1); }

    /* ===== 搜索栏 ===== */
    #search-wrap {
      position: fixed; top: 0.8rem; left: 50%; transform: translateX(-50%);
      z-index: 16; display: flex; align-items: center; gap: 0.4rem;
    }
    #search-stars {
      width: 200px; height: 32px; padding: 0 0.8rem; border-radius: 16px;
      border: 1px solid rgba(42,40,80,0.5);
      background: rgba(14,14,36,0.7); color: var(--text); font-size: 12px;
      outline: none; backdrop-filter: blur(8px);
      transition: border-color 0.3s, width 0.3s;
    }
    #search-stars::placeholder { color: var(--text-dim); }
    #search-stars:focus { border-color: var(--border-glow); width: 260px; }

    /* ===== 设置面板 ===== */
    .panel-toggle {
      position: fixed; top: 0.8rem; right: 0.8rem; z-index: 16;
      width: 34px; height: 34px; border-radius: 10px;
      border: 1px solid rgba(42,40,80,0.45);
      background: rgba(14,14,36,0.55); color: var(--text-dim);
      cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      pointer-events: auto; transition: background 0.2s, border-color 0.25s;
      backdrop-filter: blur(8px);
    }
    .panel-toggle:hover { background: rgba(24,24,56,0.75); border-color: var(--border-glow); }
    .panel {
      position: fixed; top: 0.8rem; right: 3.2rem; width: 260px; max-height: 82vh; overflow-y: auto;
      padding: 1rem; border-radius: 16px; pointer-events: auto; z-index: 15;
      background: rgba(14,14,36,0.97); border: 1px solid var(--border);
      box-shadow: 0 12px 40px rgba(0,0,0,0.55); font-size: 12px;
      backdrop-filter: blur(14px);
      transform-origin: top right; transition: opacity 0.3s, transform 0.3s;
    }
    .panel.hidden { opacity: 0; transform: scale(0.92); pointer-events: none; }
    .panel h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); margin-bottom: 0.55rem; }
    .panel label { display: flex; justify-content: space-between; align-items: center; margin: 0.45rem 0; gap: 0.5rem; color: var(--text-dim); }
    .panel label span:first-child { min-width: 70px; }
    .panel input[type="range"] { flex: 1; accent-color: var(--accent); height: 4px; }
    .panel .val { min-width: 32px; text-align: right; color: var(--text); font-variant-numeric: tabular-nums; }
    .panel input[type="password"] {
      width: 100%; height: 32px; padding: 0 0.6rem; margin-top: 0.3rem; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg-input); color: var(--text); font-size: 12px; outline: none;
    }
    .panel input[type="password"]:focus { border-color: var(--border-glow); }
    .sep { border: none; border-top: 1px solid var(--border); margin: 0.75rem 0; }
    .panel .hint { color: var(--text-dim); line-height: 1.45; margin-bottom: 0.5rem; }
    .shape-btns { display: flex; gap: 0.35rem; margin-bottom: 0.6rem; }
    .shape-btn {
      flex: 1; height: 30px; border-radius: 8px; cursor: pointer; font-size: 11px;
      border: 1px solid var(--border); background: var(--bg-input); color: var(--text-dim);
      transition: all 0.2s;
    }
    .shape-btn:hover { border-color: var(--border-glow); color: var(--text); }
    .shape-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
    .panel input[type="color"] {
      width: 42px; height: 26px; border: 1px solid var(--border); border-radius: 6px;
      background: var(--bg-input); cursor: pointer; padding: 1px;
    }
    #status-line {
      margin-top: 0.5rem; padding: 0.45rem 0.6rem; border-radius: 8px;
      background: var(--accent-soft); color: var(--text); font-size: 11px; line-height: 1.45;
    }

    /* ===== 灵感卡片 ===== */
    #card-dock {
      position: fixed; inset: 0; z-index: 48;
      display: none; align-items: center; justify-content: center;
      padding: 1rem; pointer-events: none;
      background: rgba(0,0,10,0.5);
    }
    #card-dock.card-visible { display: flex; pointer-events: auto; }
    .inspiration-card {
      width: min(92vw, 400px); max-height: min(78vh, 500px); overflow-y: auto;
      padding: 1.4rem 1.5rem; border-radius: 20px; pointer-events: auto;
      background: rgba(14,14,36,0.97); border: 1px solid var(--border);
      box-shadow: 0 24px 80px rgba(0,0,0,0.65), 0 0 50px rgba(80,120,200,0.06);
      color: var(--text); backdrop-filter: blur(16px);
    }
    .inspiration-card .card-title { font-size: 1.05rem; color: var(--accent); margin-bottom: 0.2rem; }
    .inspiration-card time { font-size: 11px; color: var(--text-dim); }
    .inspiration-card h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent); margin: 0.6rem 0 0.3rem; }
    .inspiration-card ul, .inspiration-card ol { margin-left: 1.1rem; font-size: 12.5px; line-height: 1.55; }
    .inspiration-card .card-actions-row { display: flex; gap: 0.45rem; margin-top: 0.85rem; flex-wrap: wrap; }
    .inspiration-card .card-actions-row button {
      flex: 1; min-width: 90px; height: 36px; border-radius: 10px; cursor: pointer; font-size: 12px;
      border: 1px solid var(--border); transition: background 0.2s;
    }
    .inspiration-card .card-dismiss { background: #1a1838; color: var(--text-dim); }
    .inspiration-card .card-dismiss:hover { background: #2a2850; color: var(--text); }
    .inspiration-card .card-save { background: var(--accent-soft); color: var(--accent); }
    .inspiration-card .card-save:hover { background: rgba(104,152,232,0.22); }
    .inspiration-card .card-newchat { background: rgba(100,180,255,0.1); color: #a0c8ff; }
    .inspiration-card .card-newchat:hover { background: rgba(100,180,255,0.18); }

    /* ===== 保存提示 Toast ===== */
    .save-toast {
      position: fixed; bottom: 120px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      padding: 0.7rem 1.4rem; border-radius: 14px;
      background: rgba(14,14,40,0.88); border: 1px solid rgba(80,120,200,0.25);
      color: #b0c8f0; font-size: 13px; line-height: 1.5;
      text-align: center; white-space: nowrap;
      backdrop-filter: blur(14px);
      box-shadow: 0 8px 32px rgba(0,0,20,0.5), 0 0 20px rgba(80,120,200,0.06);
      z-index: 55; pointer-events: none;
      opacity: 0;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .save-toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .save-toast .toast-icon { font-size: 15px; margin-right: 0.4rem; }
    .save-toast .toast-hint { color: var(--accent); font-weight: 500; }

    .intro-overlay {
      position: fixed; inset: 0; z-index: 50; pointer-events: none;
      background: radial-gradient(ellipse at center, rgba(0,0,5,0) 0%, rgba(0,0,5,0.92) 100%);
      opacity: 1; transition: opacity 3s ease-out;
    }
    .intro-overlay.fade-out { opacity: 0; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
      "gsap": "https://esm.sh/gsap@3.12.5"
    }
  }
  </script>
</head>
<body>
  <div id="canvas-wrap"><canvas id="main-canvas"></canvas></div>
  <div class="intro-overlay" id="intro-overlay"></div>

  <div id="splash-text">在星空中记录你的灵感<br/>每一次对话，都是一颗新星</div>

  <div id="msg-stream"></div>

  <div id="fruit-detail">
    <div class="fd-user"><div class="fd-label">你的想法</div><div class="fd-text"></div></div>
    <div class="fd-ai"><div class="fd-label">AI 回应</div><div class="fd-text"></div></div>
  </div>

  <div id="search-wrap">
    <input type="text" id="search-stars" placeholder="🔍 搜索灵感星…" autocomplete="off" />
  </div>

  <button id="btn-fullscreen" class="panel-toggle" style="right:8.4rem" title="全屏">⛶</button>
  <button id="btn-lang-toggle" class="panel-toggle" style="right:5.9rem" title="切换语言">EN</button>
  <button id="btn-new-chat" class="panel-toggle" style="right:3.35rem" title="新对话">✦</button>
  <button id="btn-panel-toggle" class="panel-toggle" title="设置">⚙</button>
  <aside class="panel hidden" id="control-panel">
    <h3>DeepSeek AI</h3>
    <p class="hint">填入 API Key 即可接入 DeepSeek 智能对话。</p>
    <input type="password" id="ds-key" placeholder="sk-xxxxxxxx" />
    <hr class="sep" />
    <h3>粒子形态</h3>
    <div class="shape-btns">
      <button class="shape-btn active" data-shape="nebula">星云</button>
      <button class="shape-btn" data-shape="heart">爱心</button>
      <button class="shape-btn" data-shape="saturn">土星</button>
      <button class="shape-btn" data-shape="firework">烟花</button>
    </div>
    <label><span>色彩 A</span><input type="color" id="cl-a" value="#2266ff" /></label>
    <label><span>色彩 B</span><input type="color" id="cl-b" value="#9944dd" /></label>
    <label><span>粒子大小</span><input type="range" id="sl-point" min="0.3" max="5" step="0.05" value="1.5" /><span class="val" id="lb-point">1.5</span></label>
    <label><span>扩散度</span><input type="range" id="sl-spread" min="0.3" max="3.0" step="0.05" value="1.0" /><span class="val" id="lb-spread">1.0</span></label>
    <label><span>鼠标力度</span><input type="range" id="sl-mouse-force" min="0.5" max="6" step="0.1" value="2.8" /><span class="val" id="lb-mouse-force">2.8</span></label>
    <hr class="sep" />
    <h3>星座连线</h3>
    <label><span>连线透明度</span><input type="range" id="sl-line-op" min="0.1" max="1.5" step="0.02" value="0.65" /><span class="val" id="lb-line-op">0.65</span></label>
    <label><span>连线亮度</span><input type="range" id="sl-line-bright" min="0.4" max="2.5" step="0.02" value="1.20" /><span class="val" id="lb-line-bright">1.20</span></label>
    <hr class="sep" />
    <h3>后处理</h3>
    <label><span>Bloom</span><input type="range" id="sl-bloom" min="0" max="2.5" step="0.02" value="1.30" /><span class="val" id="lb-bloom">1.30</span></label>
    <label><span>残影</span><input type="range" id="sl-after" min="0.0" max="0.95" step="0.005" value="0.12" /><span class="val" id="lb-after">0.12</span></label>
    <div id="status-line"></div>
  </aside>

  <div class="bottom-bar">
    <div class="input-row">
      <input type="text" id="text-input" placeholder="说说你的想法…" autocomplete="off" />
      <button type="button" class="icon-btn" id="btn-voice" title="语音输入">🎤</button>
      <button type="button" class="icon-btn primary" id="btn-send" title="发送">➤</button>
    </div>
    <div class="action-row">
      <button type="button" class="subtle-btn" id="btn-end">✧ 结束对话</button>
    </div>
  </div>

  <div id="card-dock"></div>
  <div class="save-toast" id="save-toast"></div>

  <script type="module" src="./core-entry.js"></script>
  <script>
    (function () {
      var I18N = {
        zh: {
          pageTitle: '星空灵感 · Starfield Inspiration',
          splash: '在星空中记录你的灵感<br/>每一次对话，都是一颗新星',
          fruitUser: '你的想法', fruitAI: 'AI 回应',
          btnNewChatTitle: '新对话', btnPanelTitle: '设置', btnFullscreenTitle: '全屏',
          panelDeepSeek: 'DeepSeek AI',
          panelHint: '填入 API Key 即可接入 DeepSeek 智能对话。',
          panelStars: '粒子形态',
          panelLines: '星座连线',
          panelPost: '后处理',
          labelPoint: '粒子大小', labelColorA: '色彩 A', labelColorB: '色彩 B',
          labelSpread: '扩散度', labelMouseForce: '鼠标力度',
          labelLineOp: '连线透明度', labelLineBright: '连线亮度',
          labelBloom: 'Bloom', labelAfter: '残影',
          shapeNebula: '星云', shapeHeart: '爱心', shapeSaturn: '土星', shapeFirework: '烟花',
          textPlaceholder: '说说你的想法…',
          searchPlaceholder: '🔍 搜索灵感星…',
          btnVoiceTitle: '语音输入', btnSendTitle: '发送',
          btnEnd: '✧ 结束对话',
          btnLang: 'EN', btnLangTitle: 'Switch Language',
        },
        en: {
          pageTitle: 'Starfield Inspiration · Immersive AI',
          splash: 'Record your inspiration among the stars<br/>Each conversation becomes a new star',
          fruitUser: 'Your Thought', fruitAI: 'AI Response',
          btnNewChatTitle: 'New Chat', btnPanelTitle: 'Settings', btnFullscreenTitle: 'Fullscreen',
          panelDeepSeek: 'DeepSeek AI',
          panelHint: 'Enter your API key to enable DeepSeek chat.',
          panelStars: 'Particle Shapes',
          panelLines: 'Constellation Lines',
          panelPost: 'Post Processing',
          labelPoint: 'Particle Size', labelColorA: 'Color A', labelColorB: 'Color B',
          labelSpread: 'Spread', labelMouseForce: 'Mouse Force',
          labelLineOp: 'Line Opacity', labelLineBright: 'Line Brightness',
          labelBloom: 'Bloom', labelAfter: 'Afterimage',
          shapeNebula: 'Nebula', shapeHeart: 'Heart', shapeSaturn: 'Saturn', shapeFirework: 'Firework',
          textPlaceholder: 'Share your idea...',
          searchPlaceholder: '🔍 Search inspiration stars...',
          btnVoiceTitle: 'Voice Input', btnSendTitle: 'Send',
          btnEnd: '✧ End Session',
          btnLang: '中文', btnLangTitle: '切换语言',
        },
      };

      function getLang() {
        var saved = localStorage.getItem('app-lang');
        return (saved === 'en' || saved === 'zh') ? saved : 'zh';
      }
      function setText(el, text, asHtml) {
        if (!el) return;
        if (asHtml) el.innerHTML = text; else el.textContent = text;
      }
      function setLabel(sliderId, text) {
        var slider = document.getElementById(sliderId);
        if (!slider || !slider.parentElement) return;
        var first = slider.parentElement.querySelector('span:first-child');
        if (first) first.textContent = text;
      }
      function applyLang(lang) {
        var t = I18N[lang] || I18N.zh;
        document.documentElement.lang = lang === 'en' ? 'en' : 'zh-CN';
        document.title = t.pageTitle;
        setText(document.getElementById('splash-text'), t.splash, true);
        setText(document.querySelector('#fruit-detail .fd-user .fd-label'), t.fruitUser);
        setText(document.querySelector('#fruit-detail .fd-ai .fd-label'), t.fruitAI);

        var btnFullscreen = document.getElementById('btn-fullscreen');
        var btnNew = document.getElementById('btn-new-chat');
        var btnPanel = document.getElementById('btn-panel-toggle');
        var btnVoice = document.getElementById('btn-voice');
        var btnSend = document.getElementById('btn-send');
        var btnEnd = document.getElementById('btn-end');
        var btnLang = document.getElementById('btn-lang-toggle');
        var searchEl = document.getElementById('search-stars');

        if (btnFullscreen) btnFullscreen.title = t.btnFullscreenTitle;
        if (btnNew) btnNew.title = t.btnNewChatTitle;
        if (btnPanel) btnPanel.title = t.btnPanelTitle;
        if (btnVoice) btnVoice.title = t.btnVoiceTitle;
        if (btnSend) btnSend.title = t.btnSendTitle;
        setText(btnEnd, t.btnEnd);
        setText(btnLang, t.btnLang);
        if (btnLang) btnLang.title = t.btnLangTitle;
        if (searchEl) searchEl.placeholder = t.searchPlaceholder;

        setText(document.querySelector('#control-panel h3:nth-of-type(1)'), t.panelDeepSeek);
        setText(document.querySelector('#control-panel .hint'), t.panelHint);
        setText(document.querySelector('#control-panel h3:nth-of-type(2)'), t.panelStars);
        setText(document.querySelector('#control-panel h3:nth-of-type(3)'), t.panelLines);
        setText(document.querySelector('#control-panel h3:nth-of-type(4)'), t.panelPost);

        setLabel('sl-point', t.labelPoint);
        setLabel('sl-spread', t.labelSpread);
        setLabel('sl-mouse-force', t.labelMouseForce);
        setLabel('sl-line-op', t.labelLineOp);
        setLabel('sl-line-bright', t.labelLineBright);
        setLabel('sl-bloom', t.labelBloom);
        setLabel('sl-after', t.labelAfter);
        var clAL = document.querySelector('#cl-a')?.parentElement?.querySelector('span:first-child');
        if(clAL) clAL.textContent = t.labelColorA;
        var clBL = document.querySelector('#cl-b')?.parentElement?.querySelector('span:first-child');
        if(clBL) clBL.textContent = t.labelColorB;
        document.querySelectorAll('.shape-btn').forEach(function(btn){
          var key = 'shape' + btn.dataset.shape.charAt(0).toUpperCase() + btn.dataset.shape.slice(1);
          if(t[key]) btn.textContent = t[key];
        });

        var input = document.getElementById('text-input');
        if (input) input.placeholder = t.textPlaceholder;

        window.__APP_LANG = lang;
        window.dispatchEvent(new CustomEvent('app:lang-change', { detail: { lang: lang } }));
      }

      var currentLang = getLang();
      applyLang(currentLang);
      document.getElementById('btn-lang-toggle')?.addEventListener('click', function () {
        currentLang = currentLang === 'zh' ? 'en' : 'zh';
        localStorage.setItem('app-lang', currentLang);
        applyLang(currentLang);
      });
    })();

    document.getElementById('btn-panel-toggle')?.addEventListener('click', function(){
      document.getElementById('control-panel')?.classList.toggle('hidden');
    });
    document.getElementById('btn-fullscreen')?.addEventListener('click', function(){
      if(!document.fullscreenElement){ document.documentElement.requestFullscreen().catch(function(){}); }
      else { document.exitFullscreen(); }
    });
    document.getElementById('btn-new-chat')?.addEventListener('click', function(){
      window.dispatchEvent(new CustomEvent('tree:new-chat'));
    });
    document.querySelectorAll('.panel input[type="range"]').forEach(function(el){
      var span = document.getElementById(el.id.replace('sl-','lb-'));
      function s(){ if(span) span.textContent = el.value; }
      el.addEventListener('input', s); s();
    });
    document.addEventListener('click', function(e){
      var fd = document.getElementById('fruit-detail');
      if(fd && !fd.contains(e.target) && !e.target.classList.contains('fruit-node')){
        fd.classList.remove('visible');
      }
    });
  </script>
</body>
</html>
